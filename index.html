<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="theme-color-meta" content="#111827">
<title>Stentor Ent Ltd.</title>
<style>
:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f9fa;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af;
  --border-color:#e5e7eb; --input-bg:#f9fafb; --input-border:#d1d5db;
  --button-secondary-bg:#eff6ff;
  --success-color:#10b981; --error-color:#ef4444;
  --warning-bg:#fef2f2; --warning-border:#fecaca; --warning-text:#b91c1c;
  --success-card-bg:#f0fdf4; --success-card-border:#bbf7d0;
  --modal-overlay:rgba(0,0,0,0.65); --shadow-color:rgba(0,0,0,0.1);
  --label-text:#6b7280;
  --theme-chan:#10b981;
  --theme-carr:#3b82f6;
  --theme-hub:#111827;
  --dynamic-primary:var(--theme-hub);
}

@media (prefers-color-scheme:dark) {
  :root {
    --bg-primary:#1f2937; --bg-secondary:#111827;
    --text-primary:#f9fafb; --text-secondary:#d1d5db; --text-tertiary:#9ca3af;
    --border-color:#374151; --input-bg:#374151; --input-border:#4b5563;
    --button-secondary-bg:#1e3a8a;
    --success-color:#34d399; --error-color:#f87171;
    --warning-bg:#450a0a; --warning-border:#7f1d1d; --warning-text:#fca5a5;
    --success-card-bg:#064e3b; --success-card-border:#065f46;
    --modal-overlay:rgba(0,0,0,0.85); --shadow-color:rgba(0,0,0,0.5);
    --label-text:#9ca3af;
    --theme-chan:#059669;
    --theme-carr:#2563eb;
    --theme-hub:#000000;
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text-primary); background-color: var(--dynamic-primary);
  min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 16px);
  overflow-y:auto; -webkit-overflow-scrolling:touch; transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

body.theme-chandarana{--dynamic-primary:var(--theme-chan)}
body.theme-carrefour {--dynamic-primary:var(--theme-carr);--success-color:#3b82f6}
body.theme-hub {--dynamic-primary:var(--theme-hub);}

.view-section { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; }
.view-section.active { display: flex; animation: fadeIn 0.4s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Shared Container Styles */
.container{
  width: 100%; background:var(--bg-primary); padding:24px 22px;
  border-radius:24px; box-shadow:0 15px 35px var(--shadow-color); position:relative; overflow:hidden;
}
.scrollable-container { max-height: 85vh; overflow-y: auto; overflow-x: hidden; padding-bottom: 30px; }

/* Hub Menu Styles */
.hub-logo { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.hub-logo span { display: block; font-size: 14px; font-weight: 600; opacity: 0.8; letter-spacing: 2px; margin-top: 4px; }
.menu-btn {
  width: 100%; background: var(--bg-primary); color: var(--text-primary);
  border: none; border-radius: 16px; padding: 22px; margin-bottom: 16px;
  font-size: 16px; font-weight: 700; text-align: left; display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 12px var(--shadow-color); cursor: pointer; transition: transform 0.1s;
}
.menu-btn:active { transform: scale(0.96); }
.menu-btn .icon { font-size: 24px; }
.menu-btn.accent-order { border-left: 6px solid #eab308; }
.menu-btn.accent-att { border-left: 6px solid var(--text-secondary); }

/* Navigation Back Bar */
.back-bar { width: 100%; display: flex; align-items: center; margin-bottom: 20px; color: #fff; font-weight: 600; cursor: pointer; }
.back-bar .back-icon { margin-right: 8px; font-size: 18px; }

/* Input Styles */
label{font-weight:600;font-size:12px;display:block;margin-bottom:6px;margin-top:12px;color:var(--label-text);text-transform:uppercase;letter-spacing:0.5px}
input:not([type="checkbox"]):not([type="radio"]),select,textarea{
  width:100%;padding:14px;border-radius:12px; border:1px solid var(--input-border);font-size:15px;background:var(--input-bg);
  color:var(--text-primary);transition:all 0.2s; -webkit-appearance:none; outline:none; font-family: inherit;
}
input:focus,select:focus,textarea:focus{border-color:var(--dynamic-primary);background:var(--bg-primary);box-shadow:0 0 0 3px rgba(0,0,0,0.05)}

.btn-primary{
  width:100%;height:48px;border-radius:12px;border:none; font-size:15px;font-weight:700; margin-top: 24px;
  background:var(--dynamic-primary);color:#fff; cursor:pointer;transition:transform 0.1s, opacity 0.2s;
}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}

/* Form Group Dividers */
.section-title { font-size: 14px; font-weight: 800; color: var(--text-primary); margin: 28px 0 12px 0; border-bottom: 2px solid var(--border-color); padding-bottom: 4px; }

/* Grid Table for Juices */
.table-container { width: 100%; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 12px; -webkit-overflow-scrolling: touch; background: var(--bg-primary); }
table { width: 100%; border-collapse: collapse; text-align: center; }
th, td { padding: 8px 4px; border: 1px solid var(--border-color); font-size: 12px; }
th { background: var(--input-bg); font-weight: 700; color: var(--text-secondary); white-space: nowrap; font-size: 11px; }
td.flavor-name { text-align: left; font-weight: 700; white-space: nowrap; position: sticky; left: 0; background: var(--bg-primary); z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,0.06); font-size: 11px; padding-left: 8px; }
th:first-child { position: sticky; left: 0; z-index: 3; background: var(--input-bg); box-shadow: 2px 0 5px rgba(0,0,0,0.06); }
td input { width: 38px; height: 34px; padding: 0; text-align: center; font-size: 14px; border-radius: 6px; background: var(--input-bg); border: 1px solid var(--input-border); font-weight: 600;}
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* Smart Checkboxes (Chips) */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.chip-label { cursor: pointer; display: inline-block; -webkit-tap-highlight-color: transparent; }
.chip-label input { display: none; }
.chip-span { display: inline-flex; align-items: center; background: var(--input-bg); border: 1px solid var(--input-border); padding: 10px 14px; border-radius: 50px; font-size: 13px; font-weight: 600; transition: all 0.2s; color: var(--text-secondary); }
.chip-label input:checked + .chip-span { background: var(--dynamic-primary); color: #fff; border-color: var(--dynamic-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

/* Common UI Elements */
.top-bar{display:flex;justify-content:flex-end;margin-bottom:20px}
.terminal-pill-wrapper{ position:relative;display:inline-flex;background:var(--input-bg); border:1px solid var(--border-color);border-radius:50px;padding:4px;height:40px; box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);align-items:center; }
.pill-slider{ position:absolute;top:4px;bottom:4px;left:4px;border-radius:50px; background:var(--dynamic-primary);box-shadow:0 2px 6px rgba(0,0,0,0.15); transition:all 0.35s cubic-bezier(0.25,1,0.5,1);z-index:1; }
.pill-btn{ position:relative;z-index:2;background:transparent;border:none; padding:0 16px;height:100%;font-size:13px;font-weight:700; color:var(--text-secondary);cursor:pointer;transition:color 0.2s ease; display:flex;align-items:center;justify-content:center; outline:none; -webkit-tap-highlight-color:transparent; }
.pill-btn.active{color:#fff;} .pill-btn .full-text,.pill-btn .short-text{display:none} .pill-btn.active .full-text{display:block} .pill-btn:not(.active) .short-text{display:block}

/* Success Animations */
.order-success { text-align: center; padding: 20px 0; display: none; }
.order-success.active { display: block; animation: bounceIn 0.4s ease; }
.circle-check { width: 80px; height: 80px; background: var(--dynamic-primary); color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 16px; }

/* Keep Attendance Styles Intact */
.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 12px}
.step{opacity:0.3;pointer-events:none;transition:opacity 0.4s ease}
.step.activeStep{opacity:1;pointer-events:auto;animation:bounceIn 0.45s ease}
button.att-btn{ width:100%;height:46px;border-radius:12px;border:none; font-size:14px;font-weight:700; background:var(--button-secondary-bg);color:var(--dynamic-primary); cursor:pointer;transition:transform 0.1s, opacity 0.2s, background 0.2s; }
button.att-btn:active{transform:scale(0.97)} button.att-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.msg{ font-size:12px;font-weight:600;margin-top:6px; min-height:38px; align-items:flex-start; line-height:1.4; color:var(--text-tertiary);display:flex; transition: opacity 0.3s ease, color 0.3s ease; opacity: 1; }
.msg.success{color:var(--success-color);font-size:13px} .msg.error {color:var(--error-color)}
.msg .dot{ display:inline-flex;justify-content:center;align-items:center; width:16px;height:16px;background:var(--success-color);border-radius:50%; margin-right:6px;flex-shrink:0;position:relative; margin-top: 1px; }
.msg .dot::after{ content:'';position:absolute;top:45%;left:50%; width:3.5px;height:7px; border-right:2px solid #fff;border-bottom:2px solid #fff; transform:translate(-50%,-50%) rotate(45deg); }
#videoContainerWrapper{ position:absolute; top:0; left:0; right:0; bottom:0; width:100%; height:100%; border-radius:24px; overflow:hidden; z-index:60; background-color: #000; transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.25, 1, 0.4, 1); transform: scale(0.95); opacity:0; pointer-events:none; }
#videoContainerWrapper.expanded{ pointer-events:auto; opacity:1; transform: scale(1); }
#cameraVideo{ position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; transform: scaleX(-1); opacity: 0; transition: opacity 0.4s ease; }
#cameraVideo.live { opacity: 1; }
#cameraBackdrop{ display:none;position:fixed;inset:0;z-index:59; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#cameraBackdrop.show{ display:block; }
.camera-ui{ position:absolute;bottom:0;left:0;right:0; padding:20px; background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%); display:flex;align-items:center;justify-content:center; z-index:4; }
#captureBtn{ width:64px;height:64px;border-radius:50%; background:rgba(255,255,255,0.3);border:4px solid rgba(255,255,255,0.95); cursor:pointer;display:flex;align-items:center;justify-content:center; transition:transform 0.1s, opacity 0.3s ease;-webkit-tap-highlight-color:transparent; opacity: 1; }
#captureBtn::after{content:'';width:48px;height:48px;background:#fff;border-radius:50%;transition:transform 0.1s}
#captureBtn:active{transform:scale(0.88)} #captureBtn:active::after{transform:scale(0.9)}
#closeCameraBtn{ position:absolute;top:16px;right:16px; width:36px;height:36px;border-radius:50%; background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3); color:#fff;font-size:16px; cursor:pointer; display:flex;align-items:center;justify-content:center; z-index:6; -webkit-tap-highlight-color:transparent; }
#successScreen{ display:none; flex-direction:column; align-items:center; justify-content:flex-start; padding: 12px 4px 8px; text-align:center; width:100%; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.success-photo{ width: 96px; height: 96px; object-fit: cover; border-radius: 50%; box-shadow: 0 0 0 4px var(--success-color); margin-bottom: 10px; animation: bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: zoom-in; position: relative; z-index: 20000; -webkit-tap-highlight-color: transparent; }
.success-badge{ background:var(--dynamic-primary);color:#fff;font-size:12px;font-weight:800; text-transform:uppercase;padding:5px 18px;border-radius:999px; margin-bottom: 10px;display:inline-block;box-shadow:0 4px 10px rgba(0,0,0,0.1); animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s backwards; }
.success-card{ background:var(--success-card-bg);border:1px solid var(--success-card-border); border-radius:16px;padding:16px 14px;width:100%;margin-bottom:12px; animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s backwards; }
.success-name{font-size:22px;font-weight:800;color:var(--dynamic-primary);margin-bottom:6px}
.success-msg {font-size:13px;font-weight:600;color:var(--text-secondary);line-height:1.5; word-break: break-word;}
</style>
</head>

<body class="theme-hub">

<!-- ==========================================
     VIEW 1: MAIN HUB MENU
=========================================== -->
<div id="view-menu" class="view-section active">
  <div class="hub-logo">Stentor Ent Ltd.<span>INTERNAL PORTAL</span></div>
  
  <button class="menu-btn accent-order" onclick="openOrder('Chandarana')">
    <div>
      <div style="font-size:18px; margin-bottom:4px;">🛒 Place Order</div>
      <div style="font-size:13px; color:var(--text-secondary); font-weight:500;">Submit branch requirements</div>
    </div>
    <div class="icon">›</div>
  </button>

  <button class="menu-btn accent-att" onclick="openAttendance()">
    <div>
      <div style="font-size:18px; margin-bottom:4px;">⏱️ Clock In / Out</div>
      <div style="font-size:13px; color:var(--text-secondary); font-weight:500;">Staff Attendance System</div>
    </div>
    <div class="icon">›</div>
  </button>
</div>


<!-- ==========================================
     VIEW 2: UNIFIED ORDER FORM
=========================================== -->
<div id="view-orders" class="view-section">
  <div class="back-bar" onclick="goHome()"><span class="back-icon">←</span> Back to Hub</div>
  
  <div class="container scrollable-container" id="orderFormContainer">
    
    <div class="top-bar" style="justify-content: center; margin-bottom: 10px;">
      <div class="terminal-pill-wrapper">
        <div class="pill-slider" id="o-pillSlider"></div>
        <button class="pill-btn active" id="o-btn-chandarana" type="button" onclick="switchOrderTerminal('Chandarana')">
          <span class="full-text">Chandarana</span><span class="short-text">Chan</span>
        </button>
        <button class="pill-btn" id="o-btn-carrefour" type="button" onclick="switchOrderTerminal('Carrefour')">
          <span class="full-text">Carrefour</span><span class="short-text">Carr</span>
        </button>
      </div>
    </div>

    <form id="orderForm" onsubmit="submitOrder(event)">
      
      <div class="section-title" style="margin-top: 10px;">Staff Details</div>
      <input type="text" id="o-name" placeholder="Full Name" required>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="o-id" placeholder="ID No." required>
        <input type="text" id="o-phone" placeholder="Phone No." required>
      </div>

      <!-- DYNAMIC CONTENT (Juices, Fresh Inputs, Bottles, HACCP) INJECTED HERE -->
      <div id="dynamicOrderContent"></div>

      <div class="section-title">Additional Notes</div>
      <textarea id="o-notes" rows="2" placeholder="Any special instructions..."></textarea>

      <button type="submit" class="btn-primary" id="orderSubmitBtn">Submit Order</button>
    </form>

    <div class="order-success" id="orderSuccessScreen">
      <div class="circle-check">✓</div>
      <h2 style="margin-bottom:8px;">Order Sent!</h2>
      <p style="color:var(--text-secondary); font-size:14px; margin-bottom:24px;">Your order has been logged to the sheet.</p>
      <button class="btn-primary" onclick="goHome()">Back to Hub</button>
    </div>
  </div>
</div>


<!-- ==========================================
     VIEW 3: ATTENDANCE SYSTEM
=========================================== -->
<div id="view-attendance" class="view-section">
  <div class="back-bar" onclick="goHome()"><span class="back-icon">←</span> Back to Hub</div>

  <div class="container" id="mainContainer" style="aspect-ratio: 1/1; padding:24px 22px;">
    <div id="mainForm">
      <div class="top-bar">
        <div class="terminal-pill-wrapper">
          <div class="pill-slider" id="pillSlider"></div>
          <button class="pill-btn active" id="btn-chandarana" type="button" onclick="switchTerminal('chandarana')">
            <span class="full-text">Chandarana</span><span class="short-text">Chan</span>
          </button>
          <button class="pill-btn" id="btn-carrefour" type="button" onclick="switchTerminal('carrefour')">
            <span class="full-text">Carrefour</span><span class="short-text">Carr</span>
          </button>
        </div>
      </div>

      <div class="step-grid">
        <div id="step1" class="step activeStep">
          <label>Branch</label>
          <select id="branch"><option value="">Loading...</option></select>
          <div id="branchMsg" class="msg"></div>
        </div>
        <div id="step2" class="step">
          <label>Staff ID</label>
          <input id="staffID" type="tel" placeholder="Enter ID" autocomplete="off">
          <div id="staffMsg" class="msg"></div>
        </div>
        <div id="step3" class="step">
          <label>Location</label>
          <button type="button" class="att-btn" onclick="verifyGPS()">Verify</button>
          <div id="gpsMsg" class="msg"></div>
        </div>
        <div id="step4" class="step">
          <label>Identity</label>
          <button type="button" class="att-btn" id="openCameraBtn" onclick="startCamera()">Take Selfie</button>
          <div id="cameraMsg" class="msg"></div>
        </div>
      </div>
    </div>

    <div id="successScreen">
      <img id="successPhoto" class="success-photo" src="">
      <div class="success-badge" id="successBadge">CLOCK IN</div>
      <div class="success-card">
        <div class="success-name" id="successName"></div>
        <div class="success-msg"  id="successMsg"></div>
      </div>
      <button class="att-btn" onclick="resetToStart()">← Submit Another</button>
    </div>

    <!-- Camera overlay -->
    <div id="videoContainerWrapper">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <button id="closeCameraBtn" onclick="stopCamera()">&#x2715;</button>
      <div class="camera-ui"><div id="captureBtn" onclick="capturePhoto()"></div></div>
    </div>
  </div>
</div>
<div id="cameraBackdrop" onclick="stopCamera()"></div>


<script>
// ==========================================
// CONFIGURATION & ENDPOINTS
// ==========================================

// 🛑 1. PASTE YOUR NEW ORDERS GOOGLE APPS SCRIPT URL HERE
const ORDERS_SCRIPT_URL = "https://script.google.com/macros/library/d/1V2QINsSF9dVYeJ5ZW9D4RhaPOd8H2wTBYGzTrgUUxjffcrWj_Yc3IcVA/6";

// 🛑 2. YOUR EXISTING ATTENDANCE APPS SCRIPT URL
const ATTENDANCE_SCRIPT_URL = "https://georgemwaura963-stack.github.io/wGMSystems-attendance-2/";

// ==========================================
// NAVIGATION & THEMES
// ==========================================
function hideAllViews() {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
}

function goHome() {
  hideAllViews();
  document.body.className = 'theme-hub';
  document.getElementById('view-menu').classList.add('active');
  if(typeof stopCamera === 'function') stopCamera();
}

function openAttendance() {
  hideAllViews();
  document.getElementById('view-attendance').classList.add('active');
  var term = Storage.get('selected_terminal') || 'chandarana';
  switchTerminal(term);
  initApp();
}

// ==========================================
// ORDERS LOGIC
// ==========================================
let currentOrderStore = 'Chandarana';
const JUICES = {
  Chandarana: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "APPLEJUICE", "LIMEJUICE", "HIBISCUS", "TAMARIND", "ALOE VERA", "BEETROOT", "TANGERINE", "GINGER PLAIN", "CARROT"],
  Carrefour: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "TAMARIND", "CARROT", "BEETROOT"]
};
const VOLUMES = ["3L", "5L", "10L", "15L", "20L", "25L", "30L"];

function openOrder(store) {
  hideAllViews();
  document.getElementById('view-orders').classList.add('active');
  document.getElementById('orderForm').reset();
  document.getElementById('orderForm').style.display = 'block';
  document.getElementById('orderSuccessScreen').classList.remove('active');
  switchOrderTerminal(store);
}

function switchOrderTerminal(store) {
  currentOrderStore = store;
  document.body.className = store === 'Chandarana' ? 'theme-chandarana' : 'theme-carrefour';
  
  // Update Pill Slider
  document.getElementById('o-btn-chandarana').classList.toggle('active', store === 'Chandarana');
  document.getElementById('o-btn-carrefour').classList.toggle('active',  store === 'Carrefour');
  
  setTimeout(() => {
    const ab = document.querySelector('#view-orders .pill-btn.active');
    const sl = document.getElementById('o-pillSlider');
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }, 50);

  renderDynamicOrderContent();
}

function renderDynamicOrderContent() {
  let html = '';
  
  // 1. JUICE GRID
  html += `<div class="section-title">Juice Quantities</div>`;
  html += `<div class="table-container"><table><thead><tr><th>Flavor</th>`;
  VOLUMES.forEach(v => html += `<th>${v}</th>`);
  html += `</tr></thead><tbody>`;
  
  JUICES[currentOrderStore].forEach(flavor => {
    html += `<tr><td class="flavor-name">${flavor}</td>`;
    VOLUMES.forEach(v => {
      html += `<td><input type="number" class="juice-input" data-flavor="${flavor}" data-vol="${v}" min="0"></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;

  // 2. FRESH INPUTS (Checkboxes / Radios)
  html += `<div class="section-title">Fresh Inputs</div><div class="chip-group">`;
  if(currentOrderStore === 'Chandarana') {
    html += `<label class="chip-label"><input type="checkbox" class="inp-fresh" value="Ginger"><span class="chip-span">Ginger</span></label>`;
    html += `<label class="chip-label"><input type="checkbox" class="inp-fresh" value="Lime"><span class="chip-span">Lime</span></label>`;
    html += `<label class="chip-label"><input type="radio" name="sg_chan" class="inp-fresh" value="Sugarcane (Full)"><span class="chip-span">Sugarcane (Full)</span></label>`;
    html += `<label class="chip-label"><input type="radio" name="sg_chan" class="inp-fresh" value="Sugarcane (Half)"><span class="chip-span">Sugarcane (Half)</span></label>`;
  } else {
    html += `<label class="chip-label"><input type="checkbox" class="inp-fresh" value="Sugarcane"><span class="chip-span">Sugarcane</span></label>`;
    html += `<label class="chip-label"><input type="checkbox" class="inp-fresh" value="Ginger"><span class="chip-span">Ginger</span></label>`;
    html += `<label class="chip-label"><input type="checkbox" class="inp-fresh" value="Lime"><span class="chip-span">Lime</span></label>`;
  }
  html += `</div>`;

  // 3. BOTTLES
  html += `<div class="section-title">Bottles</div><div class="chip-group">`;
  html += `<label class="chip-label"><input type="checkbox" class="inp-bottle" value="1 Litre"><span class="chip-span">1 Litre</span></label>`;
  html += `<label class="chip-label"><input type="checkbox" class="inp-bottle" value="500ml"><span class="chip-span">500ml</span></label>`;
  if(currentOrderStore === 'Carrefour') {
    html += `<label class="chip-label"><input type="checkbox" class="inp-bottle" value="250ml"><span class="chip-span">250ml</span></label>`;
  }
  html += `</div>`;

  // 4. HACCP SUPPLIES
  html += `<div class="section-title">HACCP Supplies</div><div class="chip-group">`;
  html += `<label class="chip-label"><input type="checkbox" class="inp-haccp" value="Sampling Cups"><span class="chip-span">Sampling Cups</span></label>`;
  if(currentOrderStore === 'Chandarana') {
    html += `<label class="chip-label"><input type="checkbox" class="inp-haccp" value="Gloves"><span class="chip-span">Gloves</span></label>`;
    html += `<label class="chip-label"><input type="checkbox" class="inp-haccp" value="Hairnets"><span class="chip-span">Hairnets</span></label>`;
    html += `<label class="chip-label"><input type="checkbox" class="inp-haccp" value="Towels"><span class="chip-span">Towels</span></label>`;
  }
  html += `</div>`;

  document.getElementById('dynamicOrderContent').innerHTML = html;
}

async function submitOrder(e) {
  e.preventDefault();
  const btn = document.getElementById('orderSubmitBtn');
  btn.disabled = true;
  btn.innerText = 'Submitting...';

  // Gather Chip Values perfectly formatted
  const freshVals = Array.from(document.querySelectorAll('.inp-fresh:checked')).map(el => el.value).join(', ');
  const bottleVals = Array.from(document.querySelectorAll('.inp-bottle:checked')).map(el => el.value).join(', ');
  const haccpVals = Array.from(document.querySelectorAll('.inp-haccp:checked')).map(el => el.value).join(', ');

  const payload = {
    "SHOP": currentOrderStore,
    [currentOrderStore === 'Chandarana' ? "FULL NAME" : "FULL NAME (2 Names)"]: document.getElementById('o-name').value,
    "ID NO.": document.getElementById('o-id').value,
    "PHONE NO.": document.getElementById('o-phone').value,
    "FRESH INPUTS": freshVals,
    "BOTTLES": bottleVals,
    "HACCP SUPPLIES": haccpVals,
    "NOTES": document.getElementById('o-notes').value
  };

  // Build the dynamic string per Juice (e.g. "3L: 2, 5L: 1")
  const juicePrefix = currentOrderStore === 'Chandarana' ? "JUICE (5 LITRES/3 LITRES)" : "JUICE (5 ITRES / 3 LITRES)";
  
  JUICES[currentOrderStore].forEach(flavor => {
    let flavorKey = flavor;
    if (["TREE TOMATO", "HIBISCUS", "TAMARIND", "BEETROOT", "TANGERINE", "CARROT"].includes(flavor)) {
       flavorKey = currentOrderStore === 'Chandarana' ? `${flavor} ` : flavor; 
    }
    
    let quantities = [];
    VOLUMES.forEach(v => {
      const input = document.querySelector(`.juice-input[data-flavor="${flavor}"][data-vol="${v}"]`);
      if(input && input.value && parseInt(input.value) > 0) quantities.push(`${v}: ${input.value}`);
    });
    
    if(quantities.length > 0) {
      payload[`${juicePrefix} [${flavorKey}]`] = quantities.join(', ');
    }
  });

  try {
    await fetch(ORDERS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ store: currentOrderStore, payload: payload }) });
    document.getElementById('orderForm').style.display = 'none';
    document.getElementById('orderSuccessScreen').classList.add('active');
  } catch (error) {
    alert("Error sending order. Check connection.");
  }
  btn.disabled = false;
  btn.innerText = 'Submit Order';
}

// ==========================================
// ATTENDANCE LOGIC
// ==========================================
var Storage={ set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}}, get:function(k){try{return localStorage.getItem(k)}catch(e){return null}}, remove:function(k){try{localStorage.removeItem(k)}catch(e){}} };
var currentTerminal = 'chandarana', staff = [], branches = [], coords = null, staffName = "", photo = null, activeFetchId = 0, currentAction = "", videoStream = null;

function updateTerminalUI() {
  document.body.className = 'theme-' + currentTerminal;
  document.getElementById('btn-chandarana').classList.toggle('active', currentTerminal === 'chandarana');
  document.getElementById('btn-carrefour').classList.toggle('active',  currentTerminal === 'carrefour');
  setTimeout(() => {
    var ab = document.querySelector('#view-attendance .pill-btn.active'), sl = document.getElementById('pillSlider');
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }, 50);
}

function switchTerminal(term) {
  if (currentTerminal === term && document.getElementById('view-attendance').classList.contains('active')) return;
  currentTerminal = term; Storage.set('selected_terminal', term);
  staff = []; branches = [];
  document.getElementById('branch').innerHTML = '<option value="">Loading...</option>';
  document.getElementById('successScreen').style.display='none';
  document.getElementById('mainForm').style.display='block';
  updateTerminalUI(); resetStepsFrom(2); initApp();
}

function fetchFromServer(action, data) {
  return fetch(ATTENDANCE_SCRIPT_URL, { method:'POST', body:JSON.stringify({action:action, data:data, terminal:currentTerminal}) })
    .then(r => r.json()).then(j => { if(!j.ok) throw new Error(j.error); return j.data; });
}

function initApp() {
  var myId = ++activeFetchId;
  fetchFromServer('getPortalData', {}).then(data => {
    if (myId !== activeFetchId) return;
    staff = data.staff || []; branches = data.branches || [];
    document.getElementById('branch').innerHTML = '<option value="">Choose Branch</option>' + branches.map(b => '<option value="'+b[0]+'">'+b[0]+'</option>').join('');
  }).catch(() => { document.getElementById('branch').innerHTML = '<option value="">Offline / Error</option>'; });
}

function activateStep(n) { document.getElementById('step'+n).classList.add('activeStep'); }
function resetStepsFrom(n) {
  for (var i = n; i <= 4; i++) { var el = document.getElementById('step'+i); if (el) el.classList.remove('activeStep'); }
  if (n <= 2) { staffName = ''; document.getElementById('staffID').value = ''; clearMsg('staffMsg'); }
  if (n <= 3) { coords = null; clearMsg('gpsMsg'); }
  if (n <= 4) { photo = null; stopCamera(); clearMsg('cameraMsg'); document.getElementById('successPhoto').src = ''; }
}
function resetToStart() { document.getElementById('successScreen').style.display = 'none'; document.getElementById('mainForm').style.display = 'block'; resetStepsFrom(3); }
function showSuccess(id,txt){ var e=document.getElementById(id); e.innerHTML='<span class="dot"></span> '+txt; e.className='msg success'; }
function showError(id,txt)  { var e=document.getElementById(id); e.innerText=txt; e.className='msg error'; }
function clearMsg(id)       { var e=document.getElementById(id); e.innerText=''; e.className='msg'; }

document.getElementById('branch').onchange = function() {
  if (!this.value) { resetStepsFrom(2); return; }
  showSuccess('branchMsg', 'Branch Selected');
  if (document.getElementById('step2').classList.contains('activeStep') && document.getElementById('staffID').value !== '') resetStepsFrom(2);
  activateStep(2);
};

var staffDebounce = null;
document.getElementById('staffID').addEventListener('input', function() {
  var val = this.value; clearTimeout(staffDebounce);
  staffDebounce = setTimeout(() => {
    if (val.length < 2) { resetStepsFrom(3); return; }
    var match = staff.find(s => s.id === val.trim());
    if (match) {
      staffName = match.name; currentAction = match.status === 'Clock In' ? 'Clock Out' : 'Clock In';
      showSuccess('staffMsg', 'Welcome ' + staffName); activateStep(3);
    } else { resetStepsFrom(3); showError('staffMsg', 'Invalid ID'); }
  }, 350);
});

function verifyGPS() {
  document.getElementById('gpsMsg').innerText = 'Locating…'; document.getElementById('gpsMsg').className = 'msg';
  navigator.geolocation.getCurrentPosition(
    pos => { coords = pos.coords; showSuccess('gpsMsg','Location Verified'); activateStep(4); },
    err => { showError('gpsMsg', 'GPS Failed or Blocked'); }, {enableHighAccuracy:true, timeout:10000}
  );
}

function startCamera() {
  var btn = document.getElementById('openCameraBtn');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(stream => {
      videoStream = stream; var video = document.getElementById('cameraVideo'); video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play(); document.getElementById('videoContainerWrapper').classList.add('expanded');
        document.getElementById('cameraBackdrop').classList.add('show'); video.classList.add('live');
      };
    }).catch(err => { showError('cameraMsg', 'Camera blocked'); });
}

function capturePhoto() {
  var video = document.getElementById('cameraVideo');
  var canvas = document.createElement('canvas'); canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  var ctx = canvas.getContext('2d'); ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  photo = canvas.toDataURL('image/jpeg', 0.7);
  document.getElementById('successPhoto').src = photo;
  stopCamera(); submitAttendance();
}

function stopCamera() {
  document.getElementById('videoContainerWrapper').classList.remove('expanded');
  document.getElementById('cameraBackdrop').classList.remove('show');
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

function submitAttendance() {
  var branch = document.getElementById('branch').value, staffID = document.getElementById('staffID').value;
  var payload = { name: staffName, id: staffID, branch: branch, action: currentAction, image: photo, lat: coords.latitude, lng: coords.longitude };
  
  document.getElementById('successBadge').textContent = "SENDING...";
  document.getElementById('mainForm').style.display = 'none'; document.getElementById('successScreen').style.display = 'flex';

  fetchFromServer('recordAttendance', payload).then(() => {
    document.getElementById('successBadge').textContent = currentAction.toUpperCase();
    document.getElementById('successName').textContent = staffName.split(' ')[0];
    document.getElementById('successMsg').innerHTML = "Record successfully logged!";
  }).catch(() => { document.getElementById('successMsg').innerHTML = "Saved Offline. Will sync later."; });
}
</script>
