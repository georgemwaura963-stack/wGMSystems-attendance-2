<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="theme-color-meta" content="#059669">
<script>
  (function() {
    try {
      var savedTerm = localStorage.getItem('selected_terminal') || 'chandarana';
      var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var meta = document.getElementById('theme-color-meta');
      if (meta) {
        if (savedTerm === 'carrefour') meta.setAttribute('content', isDark ? '#2563eb' : '#3b82f6');
        else meta.setAttribute('content', isDark ? '#059669' : '#10b981');
      }
    } catch(e) {}
  })();
</script>
<title>Store Attendance</title>
<style>
:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f9fa;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af;
  --border-color:#e5e7eb; --input-bg:#f9fafb; --input-border:#d1d5db;
  --button-secondary-bg:#eff6ff;
  --success-color:#10b981; --error-color:#ef4444;
  --warning-bg:#fef2f2; --warning-border:#fecaca; --warning-text:#b91c1c;
  --success-card-bg:#f0fdf4; --success-card-border:#bbf7d0;
  --modal-overlay:rgba(0,0,0,0.65); --shadow-color:rgba(0,0,0,0.1);
  --label-text:#6b7280;
  --theme-chan:#10b981;
  --theme-carr:#3b82f6;
  --dynamic-primary:var(--theme-chan);
}

@media (prefers-color-scheme:dark) {
  :root {
    --bg-primary:#1f2937; --bg-secondary:#111827;
    --text-primary:#f9fafb; --text-secondary:#d1d5db; --text-tertiary:#9ca3af;
    --border-color:#374151; --input-bg:#374151; --input-border:#4b5563;
    --button-secondary-bg:#1e3a8a;
    --success-color:#34d399; --error-color:#f87171;
    --warning-bg:#450a0a; --warning-border:#7f1d1d; --warning-text:#fca5a5;
    --success-card-bg:#064e3b; --success-card-border:#065f46;
    --modal-overlay:rgba(0,0,0,0.85); --shadow-color:rgba(0,0,0,0.5);
    --label-text:#9ca3af;
    --theme-chan:#059669;
    --theme-carr:#2563eb;
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* FIX: Layout lifted so the card is centered, sign floats above */
body {
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text-primary);
  background-color: var(--dynamic-primary);
  min-height:100vh; min-height:100dvh;
  display:flex; flex-direction:column;
  align-items:center;
  /* FIX: Use padding-top + center to let the card be the visual anchor */
  justify-content:center;
  padding: env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 16px);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

body.theme-chandarana{--dynamic-primary:var(--theme-chan)}
body.theme-carrefour {--dynamic-primary:var(--theme-carr);--success-color:#3b82f6}

/* FIX: Wrap sign + container in a single centering block */
.page-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  /* Slight upward shift so card feels centered, sign above */
  margin-top: -24px;
  width: 100%;
  max-width: 400px;
}

/* Hanging Sign */
.hanging-sign-wrapper {
  position: relative;
  margin-bottom: 44px;
  perspective: 800px;
  z-index: 10;
  width: 240px;
}
.chain {
  position: absolute;
  top: -30px;
  width: 5px;
  height: 34px;
  background: linear-gradient(to right, #9ca3af, #f3f4f6, #9ca3af);
  border-radius: 3px;
  box-shadow: inset 0 0 3px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
  z-index: 1;
}
.chain::before {
  content: ''; position: absolute; top: -6px; left: -2.5px;
  width: 10px; height: 10px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #e5e7eb, #9ca3af);
  border: 1px solid #6b7280;
  box-shadow: 0 8px 12px rgba(0,0,0,0.6), 0 3px 6px rgba(0,0,0,0.4);
}
.left-chain { left: 40px; }
.right-chain { right: 40px; }

.hanging-sign {
  background: var(--bg-primary);
  color: var(--dynamic-primary);
  padding: 12px 10px;
  border-radius: 12px;
  font-weight: 900;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-align: center;
  width: 100%;
  display: block;
  box-sizing: border-box;
  box-shadow: 0 10px 25px var(--shadow-color), inset 0 -3px 0 rgba(0,0,0,0.05);
  transform-origin: top center;
  transition: color 0.4s ease;
  position: relative;
  z-index: 2;
}

@keyframes swing {
  0%   { transform: rotateX(0deg) rotateZ(0deg); }
  20%  { transform: rotateX(25deg) rotateZ(-3deg); }
  40%  { transform: rotateX(-15deg) rotateZ(2deg); }
  60%  { transform: rotateX(8deg) rotateZ(-1deg); }
  80%  { transform: rotateX(-3deg) rotateZ(0deg); }
  100% { transform: rotateX(0deg) rotateZ(0deg); }
}
.hanging-sign.nudge {
  animation: swing 0.7s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Main Container */
.container{
  width: 100%;
  aspect-ratio: 1 / 1;
  background:var(--bg-primary);
  padding:24px 22px;
  border-radius:24px;
  box-shadow:0 15px 35px var(--shadow-color);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

#mainForm { width: 100%; }

.network-indicator{
  position:absolute;top:18px;left:18px;width:8px;height:8px;border-radius:50%;
  background:var(--success-color);opacity:0.8;transition:background 0.4s ease;
  box-shadow: 0 0 6px var(--success-color);
}
.network-indicator.offline{background:var(--text-tertiary);opacity:0.4; box-shadow:none;}

.top-bar{display:flex;justify-content:flex-end;margin-bottom:20px}
.terminal-pill-wrapper{
  position:relative;display:inline-flex;background:var(--input-bg);
  border:1px solid var(--border-color);border-radius:50px;padding:4px;height:40px;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);align-items:center;
}
.pill-slider{
  position:absolute;top:4px;bottom:4px;left:4px;border-radius:50px;
  background:var(--dynamic-primary);box-shadow:0 2px 6px rgba(0,0,0,0.15);
  transition:all 0.35s cubic-bezier(0.25,1,0.5,1);z-index:1;
}
.pill-btn{
  position:relative;z-index:2;background:transparent;border:none;
  padding:0 16px;height:100%;font-size:13px;font-weight:700;
  color:var(--text-secondary);cursor:pointer;transition:color 0.2s ease;
  display:flex;align-items:center;justify-content:center; outline:none;
  -webkit-tap-highlight-color:transparent;
}
.pill-btn.active{color:#fff;}
.pill-btn .full-text,.pill-btn .short-text{display:none}
.pill-btn.active .full-text{display:block}
.pill-btn:not(.active) .short-text{display:block}

@keyframes bounceIn{
  0%{transform:scale(0.9);opacity:0}
  60%{transform:scale(1.05)}
  100%{transform:scale(1);opacity:1}
}
@keyframes spin{ to { transform: rotate(360deg); } }

.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 12px}
.step{opacity:0.3;pointer-events:none;transition:opacity 0.4s ease}
.step.activeStep{opacity:1;pointer-events:auto;animation:bounceIn 0.45s ease}

label{font-weight:600;font-size:12px;display:block;margin-bottom:6px;color:var(--label-text);text-transform:uppercase;letter-spacing:0.5px}
input,select{
  width:100%;height:46px;padding:0 14px;border-radius:12px;
  border:1px solid var(--input-border);font-size:15px;background:var(--input-bg);
  color:var(--text-primary);transition:all 0.2s; -webkit-appearance:none; outline:none;
}
input:focus,select:focus{border-color:var(--dynamic-primary);background:var(--bg-primary);box-shadow:0 0 0 3px rgba(16, 185, 129, 0.1)}
body.theme-carrefour input:focus, body.theme-carrefour select:focus {box-shadow:0 0 0 3px rgba(59, 130, 246, 0.1)}

button{
  width:100%;height:46px;border-radius:12px;border:none; font-size:14px;font-weight:700;
  background:var(--button-secondary-bg);color:var(--dynamic-primary);
  cursor:pointer;transition:transform 0.1s, opacity 0.2s, background 0.2s;
}
button:active{transform:scale(0.97)}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.btn-spinner {
  border: 2px solid rgba(0,0,0,0.1);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

/* Camera Overlay */
#videoContainerWrapper{
  position:absolute; top:0; left:0; right:0; bottom:0;
  width:100%; height:100%; border-radius:24px;
  overflow:hidden; z-index:60; background-color: #000;
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.25, 1, 0.4, 1);
  transform: scale(0.95); opacity:0; pointer-events:none;
}
#videoContainerWrapper.expanded{
  pointer-events:auto; opacity:1; transform: scale(1);
}

#cameraVideo{
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:cover; display:block; transform: scaleX(-1);
  opacity: 0; transition: opacity 0.4s ease;
}
#cameraVideo.live { opacity: 1; }

/* Face detection overlay canvas */
#faceCanvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2; transform: scaleX(-1);
}

/* Face guide ring */
#faceGuide {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  width: 140px; height: 168px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.5);
  z-index: 3; pointer-events: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
#faceGuide.face-ok {
  border-color: rgba(52, 211, 153, 0.9);
  box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.25);
}

#faceStatus {
  position: absolute;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  letter-spacing: 0.5px;
  z-index: 5;
  white-space: nowrap;
  transition: opacity 0.3s ease;
}

#cameraBackdrop{ display:none;position:fixed;inset:0;z-index:59; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#cameraBackdrop.show{ display:block; }
.camera-ui{
  position:absolute;bottom:0;left:0;right:0; padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:center; z-index:4;
}
#captureBtn{
  width:64px;height:64px;border-radius:50%;
  background:rgba(255,255,255,0.3);border:4px solid rgba(255,255,255,0.95);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.1s, opacity 0.3s ease;-webkit-tap-highlight-color:transparent;
  opacity: 0.4;
}
#captureBtn.ready { opacity: 1; }
#captureBtn::after{content:'';width:48px;height:48px;background:#fff;border-radius:50%;transition:transform 0.1s}
#captureBtn:active{transform:scale(0.88)}
#captureBtn:active::after{transform:scale(0.9)}

#closeCameraBtn{
  position:absolute;top:16px;right:16px; width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);
  color:#fff;font-size:16px; cursor:pointer; display:flex;align-items:center;justify-content:center;
  z-index:6; -webkit-tap-highlight-color:transparent;
}

/* Messages */
.msg{
  font-size:12px;font-weight:600;margin-top:6px;
  min-height:38px;
  align-items:flex-start;
  line-height:1.4;
  color:var(--text-tertiary);display:flex;
  transition: opacity 0.3s ease, color 0.3s ease;
  opacity: 1;
}
.msg.success{color:var(--success-color);font-size:13px}
.msg.error  {color:var(--error-color)}
.msg .dot{
  display:inline-flex;justify-content:center;align-items:center;
  width:16px;height:16px;background:var(--success-color);border-radius:50%;
  margin-right:6px;flex-shrink:0;position:relative;
  margin-top: 1px;
}
.msg .dot::after{
  content:'';position:absolute;top:45%;left:50%; width:3.5px;height:7px;
  border-right:2px solid #fff;border-bottom:2px solid #fff;
  transform:translate(-50%,-50%) rotate(45deg);
}

/* FIX: Success Screen - proper scrollable layout that never distorts */
#successScreen{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding: 12px 4px 8px;
  text-align:center;
  width:100%;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.success-photo{
  width: 96px; height: 96px; object-fit: cover; border-radius: 50%;
  box-shadow: 0 0 0 4px var(--success-color); margin-bottom: 10px;
  animation: bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.4, 1), border-radius 0.4s cubic-bezier(0.25, 1, 0.4, 1), box-shadow 0.4s ease;
  cursor: zoom-in;
  flex-shrink: 0;
  position: relative; z-index: 20000;
  -webkit-tap-highlight-color: transparent;
}
.success-photo.zoomed {
  transform: scale(2.6);
  border-radius: 8%;
  box-shadow: 0 0 0 1.5px var(--success-color), 0 10px 30px rgba(0,0,0,0.3);
  cursor: zoom-out;
}

#photoBackdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 19999; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
}
#photoBackdrop.show {
  opacity: 1; pointer-events: auto;
}

.success-badge{
  background:var(--dynamic-primary);color:#fff;font-size:12px;font-weight:800;
  text-transform:uppercase;padding:5px 18px;border-radius:999px;
  margin-bottom: 10px;display:inline-block;box-shadow:0 4px 10px rgba(0,0,0,0.1);
  flex-shrink: 0;
  animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s backwards;
}
/* FIX: Success card is flex-1 and allows message to wrap without distorting other elements */
.success-card{
  background:var(--success-card-bg);border:1px solid var(--success-card-border);
  border-radius:16px;padding:16px 14px;width:100%;margin-bottom:12px;
  animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s backwards;
  flex-shrink: 0;
}
.success-name{font-size:22px;font-weight:800;color:var(--dynamic-primary);margin-bottom:6px}
.success-msg {font-size:13px;font-weight:600;color:var(--text-secondary);line-height:1.5; word-break: break-word;}
.success-back{
  width:100%;height:44px;background:var(--button-secondary-bg);
  color:var(--dynamic-primary);border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;
  flex-shrink: 0;
}

/* Modal */
#guideModal{
  display:none;position:fixed;inset:0;background:var(--modal-overlay);
  z-index:19999;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
}
#guideModal .modal-box{
  background:var(--bg-primary);padding:28px;border-radius:20px;
  text-align:center;max-width:340px;width:100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
#guideModal .modal-box h3{color:var(--error-color);margin:10px 0 16px;font-size:20px}
.modal-instructions{
  background:var(--input-bg);color:var(--text-secondary);
  padding:16px;border-radius:12px;margin-bottom:18px;
  font-size:13px;line-height:1.6;text-align:left; border: 1px solid var(--border-color);
}
</style>
</head>

<body class="theme-chandarana">
<script>
var Storage={
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}},
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
  remove:function(k){try{localStorage.removeItem(k)}catch(e){}}
};
(function(){document.body.className='theme-'+(Storage.get('selected_terminal')||'chandarana')})();
</script>

    </button>

<script>
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwU2sHe-rihmCmpRav7alxSu0mw_yfqxFkSzadHpjnNufjTuoGtVWtcEVM5fdL-2a3dEQ/exec";

var currentTerminal = Storage.get('selected_terminal') || 'chandarana';
var staff = [], branches = [], coords = null, staffName = "", photo = null;
var activeFetchId = 0, currentAction = "", videoStream = null;
var warningTimer = null;

// ─── Face detection ───────────────────────────────────────────────────────────
var faceDetector = null;
var faceDetectInterval = null;
var faceOk = false;

function initFaceDetector() {
  if (typeof window.FaceDetector !== 'undefined') {
    try {
      faceDetector = new window.FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
    } catch(e) { faceDetector = null; }
  }
}

function startFaceDetection() {
  faceOk = false;
  updateCaptureBtn(false);
  if (!faceDetector) {
    // No native API: allow capture freely after 1s (graceful degradation)
    setTimeout(function() {
      document.getElementById('faceStatus').style.opacity = '0';
      faceOk = true;
      updateCaptureBtn(true);
    }, 1000);
    return;
  }

  var video = document.getElementById('cameraVideo');
  var guide = document.getElementById('faceGuide');
  var statusEl = document.getElementById('faceStatus');
  var consecutiveHits = 0;

  faceDetectInterval = setInterval(function() {
    if (!video || !video.readyState || video.readyState < 2) return;
    faceDetector.detect(video).then(function(faces) {
      if (faces && faces.length > 0) {
        consecutiveHits++;
        guide.classList.add('face-ok');
        statusEl.textContent = consecutiveHits >= 3 ? '✓ Face detected — tap to capture' : 'Hold still…';
        if (consecutiveHits >= 3) {
          faceOk = true;
          updateCaptureBtn(true);
        }
      } else {
        consecutiveHits = 0;
        guide.classList.remove('face-ok');
        faceOk = false;
        updateCaptureBtn(false);
        statusEl.textContent = 'Position your face in the oval';
      }
    }).catch(function() {
      // detector failed, allow freely
      faceOk = true;
      updateCaptureBtn(true);
      statusEl.style.opacity = '0';
    });
  }, 400);
}

function stopFaceDetection() {
  if (faceDetectInterval) { clearInterval(faceDetectInterval); faceDetectInterval = null; }
  faceOk = false;
  updateCaptureBtn(false);
  var guide = document.getElementById('faceGuide');
  if (guide) guide.classList.remove('face-ok');
}

function updateCaptureBtn(ready) {
  var btn = document.getElementById('captureBtn');
  if (!btn) return;
  if (ready) btn.classList.add('ready'); else btn.classList.remove('ready');
}

// ─── History & sync ───────────────────────────────────────────────────────────
function cleanOldHistory() {
  var today = new Date().toDateString();
  var histRaw = Storage.get('local_history_' + currentTerminal);
  if (histRaw) {
    try {
      var history = JSON.parse(histRaw); var updated = false;
      for (var key in history) { if (!key.endsWith(today)) { delete history[key]; updated = true; } }
      if (updated) Storage.set('local_history_' + currentTerminal, JSON.stringify(history));
    } catch(e){}
  }
}

function processSyncQueue() {
  if (!navigator.onLine) return;
  var qRaw = Storage.get('sync_queue'); if (!qRaw) return;
  try {
    var queue = JSON.parse(qRaw);
    if (queue.length === 0) return;
    var item = queue[0];
    fetchFromServer('recordAttendance', item).then(function() {
      var currentQ = JSON.parse(Storage.get('sync_queue') || '[]');
      currentQ.shift(); Storage.set('sync_queue', JSON.stringify(currentQ));
      processSyncQueue();
    }).catch(function(e) { console.warn("Background sync delay", e); });
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  initFaceDetector();
  updateTerminalUI();
  checkNetworkStatus();
  cleanOldHistory();
  initApp();
  processSyncQueue();
  if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTerminalUI);
});
window.addEventListener('online', function(){ checkNetworkStatus(); processSyncQueue(); });
window.addEventListener('offline', checkNetworkStatus);

function checkNetworkStatus() {
  var ind = document.getElementById('networkIndicator');
  if (navigator.onLine) ind.classList.remove('offline'); else ind.classList.add('offline');
}

function triggerSignAnimation() {
  var sign = document.getElementById('storeSign');
  sign.classList.remove('nudge');
  void sign.offsetWidth;
  sign.classList.add('nudge');
}

function updateTerminalUI() {
  document.body.className = 'theme-' + currentTerminal;
  var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var hexColor = currentTerminal === 'chandarana' ? (isDark ? '#059669' : '#10b981') : (isDark ? '#2563eb' : '#3b82f6');
  var meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', hexColor);

  var title = document.getElementById('storeSign');
  title.innerText = currentTerminal.charAt(0).toUpperCase() + currentTerminal.slice(1);
  triggerSignAnimation();

  document.getElementById('btn-chandarana').classList.toggle('active', currentTerminal === 'chandarana');
  document.getElementById('btn-carrefour').classList.toggle('active',  currentTerminal === 'carrefour');
  requestAnimationFrame(function() { requestAnimationFrame(function() {
    var ab = document.querySelector('.pill-btn.active'), sl = document.getElementById('pillSlider');
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }); });
}

function switchTerminal(term) {
  if (currentTerminal === term) { triggerSignAnimation(); return; }
  currentTerminal = term; Storage.set('selected_terminal', term);
  staff = []; branches = [];
  document.getElementById('branch').innerHTML = '<option value="">Loading...</option>';

  document.getElementById('successScreen').style.display='none';
  document.getElementById('mainForm').style.display='block';
  document.getElementById('mainContainer').style.overflow = 'hidden';

  updateTerminalUI();
  resetStepsFrom(2);
  cleanOldHistory();
  initApp();
}

function fetchFromServer(action, data) {
  return fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:action, data:data, terminal:currentTerminal})
  }).then(function(r){ return r.json(); })
    .then(function(j){ if(!j.ok) throw new Error(j.error||'Server error'); return j.data; });
}

function populateBranches(list, savedBranch) {
  if (!Array.isArray(list)) return;
  var options = '<option value="">Choose Branch</option>' + list.map(function(b){
    return '<option value="'+b[0]+'"'+(b[0]===savedBranch?' selected':'')+'>'+b[0]+'</option>';
  }).join('');
  document.getElementById('branch').innerHTML = options;
}

// FIX: restoreUserState is now more robust — sets value directly into DOM then triggers
function restoreUserState() {
  var savedBranch = Storage.get('last_branch_' + currentTerminal);
  var branchEl = document.getElementById('branch');

  if (savedBranch && branchEl) {
    // Try to find the option
    var found = false;
    for (var i = 0; i < branchEl.options.length; i++) {
      if (branchEl.options[i].value === savedBranch) { found = true; break; }
    }
    if (found) {
      branchEl.value = savedBranch;
      handleBranchChange(true); // silent = true, won't reset downstream
    }
  }

  // FIX: Only restore staff ID after branch is restored and staff loaded
  var savedStaffID = Storage.get('last_staff_id_' + currentTerminal);
  if (savedStaffID && staff.length > 0) {
    var staffEl = document.getElementById('staffID');
    // Only populate if step2 is active
    if (document.getElementById('step2').classList.contains('activeStep')) {
      staffEl.value = savedStaffID;
      // Trigger without clearing
      handleStaffInputValue(savedStaffID);
    }
  }
}

// FIX: initApp loads cache instantly then refreshes silently
function initApp() {
  var myId = ++activeFetchId;
  var cacheKey = currentTerminal + '_portal_data';
  var savedBranch = Storage.get('last_branch_' + currentTerminal);
  var dataLoaded = false;

  // ── 1. Load from cache IMMEDIATELY (sync, instant) ──
  try {
    var raw = Storage.get(cacheKey);
    if (raw) {
      var p = JSON.parse(raw);
      if (p && Array.isArray(p.branches) && p.branches.length > 0) {
        staff = p.staff || []; branches = p.branches || [];
        populateBranches(branches, savedBranch);
        restoreUserState();
        dataLoaded = true;
      }
    }
  } catch(e) {}

  if (!dataLoaded) {
    document.getElementById('branch').innerHTML = '<option value="">Loading…</option>';
  }

  // ── 2. Refresh from network in background ──
  fetchFromServer('getPortalData', {}).then(function(data) {
    if (myId !== activeFetchId) return;
    var newStaff = data.staff || [], newBranches = data.branches || [];
    var changed = JSON.stringify(branches) !== JSON.stringify(newBranches) ||
                  JSON.stringify(staff)    !== JSON.stringify(newStaff);
    staff = newStaff; branches = newBranches;
    try { Storage.set(cacheKey, JSON.stringify({staff:staff, branches:branches})); } catch(e) {}

    if (!dataLoaded || changed) {
      // Re-populate, preserving selection
      var currentBranch = document.getElementById('branch').value || savedBranch;
      populateBranches(branches, currentBranch);
      // FIX: After repopulating, make sure branch value is really set
      if (currentBranch) {
        document.getElementById('branch').value = currentBranch;
      }
      restoreUserState();
    }
  }).catch(function() {
    if (myId === activeFetchId && !dataLoaded) {
      document.getElementById('branch').innerHTML = '<option value="">Offline — check connection</option>';
    }
  });
}

function activateStep(n) { document.getElementById('step'+n).classList.add('activeStep'); }

// FIX: resetStepsFrom no longer wipes the staffID input value unless n<=2
function resetStepsFrom(n) {
  for (var i = n; i <= 4; i++) {
    var el = document.getElementById('step'+i);
    if (el) el.classList.remove('activeStep');
  }
  if (n <= 2) {
    staffName = '';
    // Only clear staff field if fully resetting
    document.getElementById('staffID').value = '';
    clearMsg('staffMsg');
  }
  if (n <= 3) { coords = null; clearMsg('gpsMsg'); }
  if (n <= 4) {
    photo = null; stopCamera(); clearMsg('cameraMsg');
    document.getElementById('successPhoto').src = '';
  }
}

function resetToStart() {
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('mainContainer').style.overflow = 'hidden';
  document.getElementById('successPhoto').classList.remove('zoomed');
  document.getElementById('photoBackdrop').classList.remove('show');

  // Reset only GPS + camera (keep branch & staff)
  resetStepsFrom(3);
  // Re-activate step 3 since GPS needs re-verification
  var branchVal = document.getElementById('branch').value;
  var staffVal  = document.getElementById('staffID').value;
  if (branchVal && staffVal) {
    handleStaffInputValue(staffVal);
  }
}

function showSuccess(id,txt){ var e=document.getElementById(id); e.innerHTML='<span class="dot"></span> '+txt; e.className='msg success'; }
function showError(id,txt)  { var e=document.getElementById(id); e.innerText=txt; e.className='msg error'; }
function clearMsg(id)       { var e=document.getElementById(id); e.innerText=''; e.className='msg'; }

function toggleZoom() {
  var img = document.getElementById('successPhoto');
  var backdrop = document.getElementById('photoBackdrop');
  if (img.classList.contains('zoomed')) {
    img.classList.remove('zoomed');
    backdrop.classList.remove('show');
  } else {
    img.classList.add('zoomed');
    backdrop.classList.add('show');
  }
}

// FIX: handleBranchChange accepts 'silent' flag — doesn't reset staff when restoring
function handleBranchChange(silent) {
  var val = document.getElementById('branch').value;
  if (!val) { resetStepsFrom(2); return; }
  Storage.set('last_branch_' + currentTerminal, val);
  showSuccess('branchMsg', 'Branch Selected');
  if (!silent) {
    // Only reset downstream if user manually changed branch
    if (document.getElementById('step2').classList.contains('activeStep') &&
        document.getElementById('staffID').value !== '') {
      resetStepsFrom(2);
    }
  }
  if (!document.getElementById('step2').classList.contains('activeStep')) {
    activateStep(2);
  }
}
document.getElementById('branch').onchange = function() { handleBranchChange(false); };

// FIX: Extracted staff input logic so it can be called with a value directly
// (prevents the "disappearing ID" bug from oninput firing mid-composition)
function handleStaffInputValue(val) {
  if (!val) return;
  val = val.trim();
  if (val.length < 2) { resetStepsFrom(3); clearMsg('staffMsg'); return; }

  var match = null;
  for (var i = 0; i < staff.length; i++) { if (staff[i].id === val) { match = staff[i]; break; } }

  if (match) {
    staffName = match.name;
    var todayKey = new Date().toDateString();
    var historyRaw = Storage.get('local_history_' + currentTerminal);
    var history = historyRaw ? JSON.parse(historyRaw) : {};
    var historyEntry = history[match.id + '_' + todayKey];
    var lastAction = match.status;
    var lastTime = null;

    if (historyEntry) {
      if (typeof historyEntry === 'string') { lastAction = historyEntry; }
      else { lastAction = historyEntry.action; lastTime = historyEntry.time; }
    }

    // FIX: Clock-out time restriction REMOVED (re-enable when testing done)
    // If they clocked out today, allow re-entry (for testing)
    if (lastAction === 'Clock Out') {
      currentAction = 'Clock In'; // allow again for testing
    } else if (lastAction === 'Clock In') {
      currentAction = 'Clock Out';
    } else {
      currentAction = 'Clock In';
    }

    showSuccess('staffMsg', 'Welcome ' + staffName);

    if (document.getElementById('step4').classList.contains('activeStep')) resetStepsFrom(4);
    if (!document.getElementById('step3').classList.contains('activeStep')) activateStep(3);
  } else {
    resetStepsFrom(3); showError('staffMsg', 'Invalid Staff ID. Please check.');
  }
}

// FIX: Use 'change' + 'input' carefully to avoid mid-type disappearing
// 'input' fires continuously but we debounce it
var staffDebounce = null;
document.getElementById('staffID').addEventListener('input', function() {
  var val = this.value;
  clearTimeout(staffDebounce);
  staffDebounce = setTimeout(function() {
    handleStaffInputValue(val);
  }, 350); // wait 350ms after last keystroke
});

// Also handle paste
document.getElementById('staffID').addEventListener('change', function() {
  clearTimeout(staffDebounce);
  handleStaffInputValue(this.value);
});

function showGuideModal(type) {
  var modal=document.getElementById('guideModal'), title=document.getElementById('guideTitle'),
      text=document.getElementById('guideText'),   icon=document.getElementById('guideIcon');
  if (type==='gps') {
    icon.textContent='📍'; title.textContent='Location Blocked'; title.style.color='var(--error-color)';
    text.innerHTML='<p>We need your location to verify you are at the branch.</p>'
      +'<p style="margin-top:8px"><strong>🍎 iPhone:</strong><br>Settings → Privacy & Security → Location Services → Allow Safari/Chrome.</p>'
      +'<p style="margin-top:8px"><strong>🤖 Android:</strong><br>⋮ Menu → Settings → Site settings → Location → Allow.</p>'
      +'<p style="margin-top:12px; color:var(--error-color); font-weight:bold;">After allowing, please clear the browser from your recent apps and reopen.</p>';
  } else if (type==='gps_signal') {
    icon.textContent='📡'; title.textContent='Weak GPS Signal'; title.style.color='var(--warning-text)';
    text.innerHTML='<p>We couldn\'t get an accurate location reading.</p>'
      +'<ul style="margin-top:8px;padding-left:20px"><li>Step outside or near a window.</li><li>Turn WiFi ON — it helps GPS lock faster.</li></ul>';
  } else if (type==='camera') {
    icon.textContent='📸'; title.textContent='Camera Access Denied'; title.style.color='var(--error-color)';
    text.innerHTML='<p>Camera permission is required to capture your identity securely.</p>'
      +'<p style="margin-top:8px"><strong>🍎 iPhone:</strong> Settings → Safari/Chrome → Camera → Allow.</p>'
      +'<p style="margin-top:8px"><strong>🤖 Android:</strong> Site settings → Camera → Allow.</p>'
      +'<p style="margin-top:12px; color:var(--error-color); font-weight:bold;">After allowing, please clear the browser from your recent apps and reopen.</p>';
  } else if (type==='no_face') {
    icon.textContent='🙈'; title.textContent='No Face Detected'; title.style.color='var(--error-color)';
    text.innerHTML='<p>We couldn\'t detect a face in the captured photo.</p>'
      +'<ul style="margin-top:8px;padding-left:20px"><li>Make sure your face is well-lit.</li><li>Remove sunglasses or hats.</li><li>Hold the phone at face level.</li></ul>';
  }
  modal.style.display = 'flex';
}

function verifyGPS() {
  document.getElementById('gpsMsg').innerText = 'Locating…';
  document.getElementById('gpsMsg').className = 'msg';
  if (!navigator.geolocation) { showError('gpsMsg','GPS not supported on this device.'); return; }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      coords = pos.coords;
      var b=null, bv=document.getElementById('branch').value;
      for (var i=0;i<branches.length;i++) { if (branches[i][0]===bv){ b=branches[i]; break; } }
      if (!b) { showError('gpsMsg','Select branch first.'); return; }
      var R=6371e3, dLat=(b[1]-coords.latitude)*Math.PI/180, dLon=(b[2]-coords.longitude)*Math.PI/180,
          a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(coords.latitude*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2),
          dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      if (dist > 250)
        showError('gpsMsg', dist>1000 ? 'Too far ('+(dist/1000).toFixed(1)+'km)' : 'Too far ('+Math.round(dist)+'m) — move closer');
      else { showSuccess('gpsMsg','Location Verified'); activateStep(4); }
    },
    function(err){ if(err.code===1) showGuideModal('gps'); else showGuideModal('gps_signal'); },
    {enableHighAccuracy:true, timeout:15000, maximumAge:60000}
  );
}

function startCamera() {
  var btn = document.getElementById('openCameraBtn');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showGuideModal('camera'); return; }

  btn.classList.add('loading');
  btn.innerHTML = '<span class="btn-spinner" style="display:inline-block;vertical-align:middle;width:16px;height:16px;margin-right:8px;"></span><span style="vertical-align:middle;">Starting…</span>';
  clearMsg('cameraMsg');

  var constraints = { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      videoStream = stream;
      var video = document.getElementById('cameraVideo');
      video.srcObject = stream;
      video.onloadedmetadata = function() {
        video.play().catch(function(){});
        document.getElementById('videoContainerWrapper').classList.add('expanded');
        document.getElementById('cameraBackdrop').classList.add('show');
        video.classList.add('live');
        btn.classList.remove('loading');
        btn.innerText = 'Take Selfie';
        // Start face detection after a short warm-up
        setTimeout(startFaceDetection, 600);
      };
    })
    .catch(function(err) {
      console.warn('Camera failed:', err);
      btn.classList.remove('loading');
      btn.innerText = 'Take Selfie';
      showGuideModal('camera');
    });
}

function capturePhoto() {
  // FIX: If face detector available, only allow when face is detected
  if (faceDetector && !faceOk) {
    var statusEl = document.getElementById('faceStatus');
    statusEl.textContent = '⚠ No face detected — reposition';
    return;
  }

  var video = document.getElementById('cameraVideo');
  var wrapper = document.getElementById('mainContainer');
  var vw = video.videoWidth || 1280, vh = video.videoHeight || 720;
  var cw = wrapper.offsetWidth, ch = wrapper.offsetHeight;
  var containerAspect = cw / ch;
  var videoAspect = vw / vh;

  var sWidth, sHeight, startX, startY;
  if (videoAspect > containerAspect) {
    sHeight = vh; sWidth = vh * containerAspect;
    startX = (vw - sWidth) / 2; startY = 0;
  } else {
    sWidth = vw; sHeight = vw / containerAspect;
    startX = 0; startY = (vh - sHeight) / 2;
  }

  var maxOutput = 720;
  var scale = (sWidth > maxOutput || sHeight > maxOutput) ? (maxOutput / Math.max(sWidth, sHeight)) : 1;
  var canvas = document.createElement('canvas');
  canvas.width = Math.round(sWidth * scale);
  canvas.height = Math.round(sHeight * scale);
  var ctx = canvas.getContext('2d');
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(video, startX, startY, sWidth, sHeight, 0, 0, canvas.width, canvas.height);

  photo = canvas.toDataURL('image/jpeg', 0.85);
  document.getElementById('successPhoto').src = photo;
  stopCamera();
  submitAttendance();
}

function stopCamera() {
  stopFaceDetection();
  var wrapper = document.getElementById('videoContainerWrapper');
  var backdrop = document.getElementById('cameraBackdrop');
  wrapper.classList.remove('expanded');
  backdrop.classList.remove('show');
  var video = document.getElementById('cameraVideo');
  video.classList.remove('live');

  var btn = document.getElementById('openCameraBtn');
  if (btn && !btn.classList.contains('loading')) btn.textContent = 'Take Selfie';

  setTimeout(function() {
    if (videoStream) { videoStream.getTracks().forEach(function(t){ t.stop(); }); videoStream = null; }
    video.srcObject = null;
  }, 300);
}

function queueSubmission(payload) {
  var queue = JSON.parse(Storage.get('sync_queue') || '[]');
  queue.push(payload); Storage.set('sync_queue', JSON.stringify(queue));
  processSyncQueue();
}

function submitAttendance() {
  var branch = document.getElementById('branch').value, staffID = document.getElementById('staffID').value;
  if (!branch||!staffID||!currentAction||!photo) return;

  Storage.set('last_staff_id_' + currentTerminal, staffID);

  var todayKey = new Date().toDateString();
  var histRaw = Storage.get('local_history_' + currentTerminal);
  var history = histRaw ? JSON.parse(histRaw) : {};
  history[staffID + '_' + todayKey] = { action: currentAction, time: Date.now() };
  Storage.set('local_history_' + currentTerminal, JSON.stringify(history));

  var payload = {
    name: staffName, id: staffID, branch: branch, action: currentAction, image: photo,
    lat: coords ? coords.latitude : 0, lng: coords ? coords.longitude : 0,
    clientTimestamp: new Date().toISOString()
  };

  queueSubmission(payload);
  finishSubmission(currentAction);
}

function finishSubmission(action) {
  var firstName = staffName.split(' ')[0] || staffName;
  var hrs = new Date().getHours(), mins = new Date().getMinutes(), timeVal = hrs + (mins / 60.0);
  var msg = '';

  if (action === 'Clock In') {
    if (timeVal < 6.5)       { msg = "Fantastic start — you're early today! Keep it up."; }
    else if (timeVal <= 7.66){ msg = "Great, you are on time for the morning shift."; }
    else if (timeVal < 11.0) { msg = "Note: Late for morning shift.<br><br><span style='color:var(--error-color);font-size:12px;display:block;'>Consistent lateness will be forwarded to management for review.</span>"; }
    else if (timeVal < 14.0) { msg = "Early for the second shift. Great job!"; }
    else if (timeVal <= 14.66){ msg = "On time for the second shift. Have a productive afternoon!"; }
    else                     { msg = "Note: Late for afternoon shift."; }
  } else {
    if (hrs < 16) { msg = "Have a wonderful afternoon!"; }
    else          { msg = "Have a restful night!"; }
    if (hrs >= 18) { msg += "<br><br><span style='display:block;'>Remember to place your order.</span>"; }
  }

  document.getElementById('successBadge').textContent = action.toUpperCase();
  document.getElementById('successName').textContent = firstName;
  document.getElementById('successMsg').innerHTML = msg;

  document.getElementById('mainContainer').style.overflow = 'visible';
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successScreen').style.display = 'flex';
}
</script>
